{% extends "layout.html" %}
{% block body %}
        <header class="masthead" style="background-image: url('     {{ url_for('static', filename='assets/img/adminheaderphoto.png') }}        ')">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="site-heading">
                            <h1>{{params['admin_dashboard_heading1']}}</h1>
                            <span class="subheading">{{params['admin_dashboard_subheading']}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        

        <!-- Main Content-->
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <!-- Todo: Fetch it using for loop from the database  -->
                    <h1>Basic Actions</h1>
                    <a href="/edit/0"><button class="btn btn-primary text-uppercase">Add a New Post</button></a>
                    <a href="/logout"><button class="btn btn-danger text-uppercase float-right">Log Out</button></a>
                    <hr>
                    <h1>Edit Posts</h1>
                    <table class="table table-hover">
                        <thead>
                          <tr>
                            <th scope="col">Sno</th>
                            <th scope="col">Title</th>
                            <th scope="col">Edit</th>
                            <th scope="col">Delete</th>
                          </tr>
                        </thead>
                        <tbody>
                        {% for post in posts  %}
                          <tr>
                            <th scope="row">{{post.sno}}</th>
                            <td>{{post.title}}</td>
                            <td><a href="/edit/{{post.sno}}"><button class="btn btn-primary text-uppercase">Edit</button></a></td>
                            <td><a href="/delete/{{post.sno}}"><button class="btn btn-danger text-uppercase">Delete</button></a></td>
                          </tr>
                          
                        {% endfor %}
                        </tbody>
                      </table>
                </div>
            </div>
        </div>
{% endblock %}
